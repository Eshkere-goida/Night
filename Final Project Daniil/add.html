<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить предмет</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content container">
            <div class="logo">СКЛАД: ПРИЕМКА</div>
            <nav>
                <a href="index.html">На главную</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <div class="form-container">
            <h2>📦 Регистрация нового груза</h2>
            <form id="add-item-form" enctype="multipart/form-data">
                <input type="text" id="name" name="name" placeholder="Название предмета" required>
                
                <input type="file" id="image_file" name="image_file" accept="image/*" required>
                
                <div class="form-row">
                    <input type="number" id="sector" name="sector" placeholder="Сектор (1-99)" required>
                    <input type="number" id="quantity" name="quantity" placeholder="Количество" required>
                </div>
                
                <div class="form-row">
                    <input type="number" step="0.1" id="weight" name="weight" placeholder="Вес (кг)">
                    <input type="number" id="price" name="price" placeholder="Цена (₽)" required>  <!-- ДОБАВЛЕНО ПОЛЕ PRICE -->
                </div>
                
                <label class="checkbox-label">
                    <input type="checkbox" id="is_dangerous" name="is_dangerous"> Опасный груз
                </label>
                
                <button type="submit" id="save-btn">Сохранить на склад</button>
            </form>
            
            <div class="preview-section" id="preview-container" style="display: none;">
                <p>Предпросмотр фото:</p>
                <img id="preview-img" src="#" alt="Превью">
            </div>
        </div>
    </main>
    <script src="add-script.js"></script>
</body>
</html>
