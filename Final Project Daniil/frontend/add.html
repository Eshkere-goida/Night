<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить предмет</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content container">
            <div class="logo">СКЛАД: ПРИЕМКА</div>
            <nav>
                <a href="index.html">На главную</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <div class="form-container">
            <h2>📦 Регистрация нового груза</h2>
            <form id="add-item-form">
                <input type="text" id="name" placeholder="Название предмета" required>
                <div class="input-group">
                    <input type="file" id="image_file" accept="image_file" required>
                </div>
                <div class="form-row">
                    <input type="number" id="sector" placeholder="Сектор" required>
                    <input type="number" id="quantity" placeholder="Количество" required>
                </div>
                <input type="number" step="0.1" id="weight" placeholder="Вес(кг)">
                <label class="checkbox-label">
                    <input type="checkbox" id="is_dangerous"> Опасный груз
                </label>
                <button type="submit" id="save-btn">Сохранить на склад</button>

            </form>
            <div class="preview-section">
                <p>Предпросмотр фото:</p>
                <img id="preview-img" src="https://via.placeholder.com/150" alt="Превью">
        
            </div>
        </div>
    </main>
    <script src="add-script.js"></script>
</body>
</html>
